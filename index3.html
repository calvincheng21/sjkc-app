<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJKC 智能学习平台</title>
    <!-- 引入 Tailwind CSS 响应式布局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts 楷体 (Noto Serif SC 极其接近规范楷体) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    <!-- 引入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 引入 FontAwesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 全局应用楷体（仅限中文字体增强书写感） */
        .font-kaiti {
            font-family: 'Noto Serif SC', KaiTi, '楷体', serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 min-h-screen font-sans">

    <!-- ==================== 页面 1：登录与欢迎页 ==================== -->
    <div id="auth-page" class="container mx-auto px-4 min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-gray-100 text-center transition-all">
            <h1 class="text-3xl font-bold text-blue-600 mb-2 font-kaiti">SJKC 华语学习王</h1>
            <p class="text-gray-400 text-sm mb-8">Grade 1 to 6 Interactive Learning Platform</p>

            <!-- 未登录状态 -->
            <div id="login-section" class="hidden">
                <div class="mb-6 flex justify-center text-blue-500 text-5xl">
                    <i class="fa-solid <div id="main-page" class="hidden min-h-screen flex flex-col">
        <!-- 顶部导航栏 -->
        <header class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-600 text-white p-2 rounded-lg shadow-md">
                        <i class="fa-solid fa-graduation-cap text-lg"></i>
                    </div>
                    <span class="text-xl font-bold text-gray-900 font-kaiti">SJKC 学习大厅</span>
                </div>
                
                <!-- 顶栏右侧用户微型档案 -->
                <div class="flex items-center space-x-4">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-semibold text-gray-700" id="nav-user-name">加载中...</p>
                        <p class="text-xs text-green-500 flex items-center justify-end">
                            <span class="w-2 h-2 rounded-full bg-green-500 mr-1 animate-pulse"></span>在线学习中
                        </p>
                    </div>
                    <img id="nav-user-avatar" class="w-10 h-10 rounded-full border-2 border-blue-100 shadow-sm" src="" alt="头像">
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition text-sm p-2" title="退出登录">
                        <i class="fa-solid fa-right-from-bracket text-lg"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 主体内容区 -->
        <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                
                <!-- 左侧/上方：年级选择（手机端横向滚动，电脑端纵向卡片） -->
                <div class="lg:col-span-1">
                    <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center font-kaiti">
                        <i class="fa-solid fa-layer-group text-blue-500 mr-2"></i>选择班级年级
                    </h2>
                    <!-- 响应式年级容器：手机端横向滑动流，桌面端单列垂直卡片 -->
                    <div id="grade-container" class="flex overflow-x-auto lg:overflow-x-visible lg:flex-col gap-3 pb-3 lg:pb-0 scrollbar-none snap-x">
                        <!-- 由 JS 动态渲染 1-6 年级 -->
                    </div>
                </div>

                <!-- 右侧/下方：课程科目面板 -->
                <div class="lg:col-span-3">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold text-gray-900 flex items-center font-kaiti">
                            <i class="fa-solid fa-book-open text-blue-500 mr-2"></i>
                            当前选择：<span id="current-selection-title" class="text-blue-600 font-bold ml-1">一年级 (Grade 1)</span>
                        </h2>
                        <span class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded-full border border-blue-100 hidden sm:inline-block">
                            首选推荐课程
                        </span>
                    </div>

                    <!-- 科目网格：手机端 1 列，平板 2 列，电脑端 3 列 -->
                    <div id="subject-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                        <!-- 由 JS 动态渲染五大科目 -->
                    </div>

                    <!-- 底部彩蛋卡片：快捷通知/学习进度 -->
                    <div class="mt-8 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                        <div class="relative z-10 max-w-md">
                            <h3 class="text-lg font-bold mb-1 font-kaiti">💡 今日挑战已更新！</h3>
                            <p class="text-blue-100 text-sm mb-4">完成任意单元的华文“形近字”趣味配对，即可在全校排行榜中解锁专属限量勋章。</p>
                            <button class="bg-white text-blue-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-opacity-90 transition shadow-md">
                                查看详情
                            </button>
                        </div>
                        <i class="fa-solid fa-rocket text-9xl text-white opacity-10 absolute -right-4 -bottom-4 rotate-12"></i>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- ==================== JavaScript 核心逻辑 ==================== -->
    <script>
        const SUPABASE_URL = 'https://exbgasbhiztzeixustjo.supabase.co';
        const SUPABASE_ANON_KEY = '你的_真实_ANON_KEY'; // 👈 记得换成你的
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let countdownTimer = null;
        let selectedGrade = 1; // 默认选择 1 年级

        // 科目静态配置数据
        const subjectsConfig = [
            { id: 'bc', name: '华文', en: 'Bahasa Cina', icon: 'fa-character', color: 'from-red-500 to-orange-500', bg: 'bg-red-50' },
            { id: 'bm', name: '马来文', en: 'Bahasa Melayu', icon: 'fa-language', color: 'from-green-500 to-teal-500', bg: 'bg-green-50' },
            { id: 'bi', name: '英文', en: 'English', icon: 'fa-font', color: 'from-blue-500 to-indigo-500', bg: 'bg-blue-50' },
            { id: 'math', name: '数学', en: 'Matematik', icon: 'fa-calculator', color: 'from-purple-500 to-pink-500', bg: 'bg-purple-50' },
            { id: 'sci', name: '科学', en: 'Sains', icon: 'fa-flask', color: 'from-amber-500 to-yellow-500', bg: 'bg-amber-50' }
        ];

        // 1. 登录验证
        async function loginWithGoogle() {
            await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
        }

        // 2. 退出登录
        window.logout = async function() {
            await supabaseClient.auth.signOut();
            localStorage.clear();
            window.location.reload();
        }

        // 3. 核心状态检查
        async function checkStatus() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            const authPage = document.getElementById('auth-page');
            const mainPage = document.getElementById('main-page');
            const loginSection = document.getElementById('login-section');
            const welcomeSection = document.getElementById('welcome-section');

            if (session && session.user) {
                // 已登录：显示欢迎倒计时界面
                loginSection.classList.add('hidden');
                welcomeSection.classList.remove('hidden');

                const meta = session.user.user_metadata;
                document.getElementById('user-name').innerText = meta.full_name || "同学";
                document.getElementById('user-avatar').src = meta.avatar_url || 'https://via.placeholder.com/150';
                
                // 顶栏同步填充
                document.getElementById('nav-user-name').innerText = meta.full_name || "同学";
                document.getElementById('nav-user-avatar').src = meta.avatar_url || 'https://via.placeholder.com/150';

                // 启动 3 秒自动倒计时跳转
                startCountdown();
            } else {
                // 未登录：停留在登录按钮页
                loginSection.classList.remove('hidden');
                welcomeSection.classList.add('hidden');
                authPage.classList.remove('hidden');
                mainPage.classList.add('hidden');
            }
        }

        // 4. 倒计时跳转逻辑
        function startCountdown() {
            let seconds = 3;
            const btnText = document.getElementById('countdown-btn-text');
            
            countdownTimer = setInterval(() => {
                seconds--;
                if (seconds <= 0) {
                    goToMainMenu();
                } else {
                    btnText.innerText = `进入系统 (${seconds}s)`;
                }
            }, 1000);
        }

        // 手动或倒计时结束进入大厅
        function goToMainMenu() {
            if (countdownTimer) clearInterval(countdownTimer);
            
            // 切换隐藏/显示页面
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('main-page').classList.remove('hidden');
            
            // 渲染大厅组件
            renderGrades();
            renderSubjects();
        }

        // 5. UX 渲染：1至6年级选择器
        function renderGrades() {
            const container = document.getElementById('grade-container');
            container.innerHTML = '';

            for (let i = 1; i <= 6; i++) {
                const isActive = selectedGrade === i;
                const card = document.createElement('button');
                // 完美支持手机端 snap 对齐与电脑端通栏展示
                card.className = `snap-center shrink-0 min-w-[110px] lg:w-full text-left p-4 rounded-xl border transition duration-200 flex flex-col lg:flex-row lg:items-center justify-between ${
                    isActive 
                    ? 'bg-blue-600 border-blue-600 text-white shadow-md shadow-blue-100' 
                    : 'bg-white border-gray-200 text-gray-700 hover:border-blue-300 hover:bg-blue-50/30'
                }`;
                
                card.innerHTML = `
                    <div>
                        <p class="font-bold text-base font-kaiti">${i} 年级</p>
                        <p class="text-[10px] ${isActive ? 'text-blue-100' : 'text-gray-400'} font-sans">Grade ${i}</p>
                    </div>
                    <span class="text-xs px-2 py-0.5 rounded-full mt-1 lg:mt-0 ${isActive ? 'bg-white/20 text-white' : 'bg-gray-100 text-gray-500'}">SJKC</span>
                `;
                
                card.onclick = () => {
                    selectedGrade = i;
                    document.getElementById('current-selection-title').innerText = `${i} 年级 (Grade ${i})`;
                    renderGrades(); // 刷新状态高亮
                    renderSubjects(); // 刷新科目数据
                };
                
                container.appendChild(card);
            }
        }

        // 6. UX 渲染：五大科目自适应网格
        function renderSubjects() {
            const grid = document.getElementById('subject-grid');
            grid.innerHTML = '';

            subjectsConfig.forEach(sub => {
                const card = document.createElement('div');
                // 电脑端 Hover 上浮，手机端放大，支持触控回馈
                card.className = `bg-white border border-gray-100 rounded-2xl p-6 shadow-sm hover:shadow-md hover:-translate-y-1 transition duration-300 flex flex-col justify-between group`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 rounded-xl bg-gradient-to-br ${sub.color} text-white flex items-center justify-center text-xl shadow-sm group-hover:scale-110 transition duration-300">
                                <i class="fa-solid ${sub.icon}"></i>
                            </div>
                            <span class="text-[11px] font-semibold tracking-wider text-gray-400 uppercase font-sans">${sub.id}</span>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-1 font-kaiti">${sub.name}</h3>
                        <p class="text-xs text-gray-400 font-sans mb-6">${sub.en}</p>
                    </div>
                    
                    <button onclick="startLesson('${sub.id}', ${selectedGrade})" class="w-full bg-slate-100 text-gray-700 py-2.5 px-4 rounded-xl font-bold text-sm hover:bg-blue-600 hover:text-white transition duration-200 flex items-center justify-center space-x-2">
                        <span>进入课堂</span>
                        <i class="fa-solid fa-arrow-right text-xs"></i>
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        // 7. 进入具体课程的枢纽函数
        function startLesson(subjectId, grade) {
            console.log(`正在前往: ${grade}年级 - 科目代码: ${subjectId}`);
            alert(`🚀 正在为你加载 [${grade}年级] 的 [${subjectsConfig.find(s=>s.id===subjectId).name}] 互动课程！`);
            // 这里以后可以写：window.location.href = `game.html?grade=${grade}&subject=${subjectId}`;
        }

        // 执行初始化检测
        checkStatus();
    </script>
</body>
</html>
