<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六年级华文 - 智慧之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="bg-orange-50 min-h-screen pb-20 invisible" id="page-body"> <div class="bg-orange-500 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto p-4 flex justify-between items-center">
            <div class="flex items-center">
                <button onclick="window.location.href='index.html'" class="mr-4 text-2xl hover:scale-110 transition shrink-0">⬅️</button>
                <div>
                    <h1 class="text-xl font-bold">六年级华文：智慧之旅</h1>
                    <p class="text-xs text-orange-100 mt-0.5 font-medium">
                        同学：<span id="student-name-display" class="font-bold text-white bg-orange-600 px-2 py-0.5 rounded-full">加载中...</span>
                    </p>
                </div>
            </div>
            <button onclick="handleLogout()" class="text-xs bg-orange-600 hover:bg-orange-700 font-bold px-3 py-1.5 rounded-xl transition">
                退出
            </button>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-4 mt-6">
        
<div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex flex-col sm:flex-row items-center justify-between gap-4 border-2 border-orange-200">
    <div class="flex items-center gap-2">
        <span class="font-extrabold text-orange-800 text-lg">当前正在学习：</span>
    </div>
    
    <div class="relative w-full sm:w-72">
        <select id="unit-selector" onchange="handleUnitChange()" class="w-full bg-orange-50 border-2 border-orange-300 text-orange-900 font-bold px-4 py-2.5 rounded-xl shadow-sm focus:outline-none focus:border-orange-500 transition cursor-pointer appearance-none text-base">
            </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-orange-700">
            ▼
        </div>
    </div>
</div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            
            <div onclick="switchActivity('reading')" id="btn-reading" class="activity-card cursor-pointer bg-white p-6 rounded-3xl shadow-md border-b-8 border-blue-400 hover:-translate-y-1 transition-all text-center">
                <div class="text-4xl mb-3">📖</div>
                <h3 class="font-extrabold text-slate-700">阅读天地</h3>
                <p class="text-xs text-slate-400 mt-1">课文朗读与赏析</p>
            </div>

            <div onclick="switchActivity('learning')" id="btn-learning" class="activity-card cursor-pointer bg-white p-6 rounded-3xl shadow-md border-b-8 border-green-400 hover:-translate-y-1 transition-all text-center">
                <div class="text-4xl mb-3">💡</div>
                <h3 class="font-extrabold text-slate-700">学习中心</h3>
                <p class="text-xs text-slate-400 mt-1">生字、部首与词语</p>
            </div>

            <div onclick="switchActivity('practice')" id="btn-practice" class="activity-card cursor-pointer bg-white p-6 rounded-3xl shadow-md border-b-8 border-yellow-400 hover:-translate-y-1 transition-all text-center">
                <div class="text-4xl mb-3">✍️</div>
                <h3 class="font-extrabold text-slate-700">巩固练习</h3>
                <p class="text-xs text-slate-400 mt-1">形近字与填充题</p>
            </div>

            <div onclick="switchActivity('quiz')" id="btn-quiz" class="activity-card cursor-pointer bg-white p-6 rounded-3xl shadow-md border-b-8 border-red-400 hover:-translate-y-1 transition-all text-center">
                <div class="text-4xl mb-3">🔥</div>
                <h3 class="font-extrabold text-slate-700">闯关挑战</h3>
                <p class="text-xs text-slate-400 mt-1">限时测验赢积分</p>
            </div>

        </div>

        <div id="activity-content-container" class="mt-8 bg-white rounded-3xl p-6 md:p-8 shadow-inner min-h-[400px] border-2 border-slate-100 transition-all duration-300">
            <div class="text-center text-slate-400 pt-20">
                <p class="text-lg font-bold">🎉 欢迎来到华文学习基地！</p>
                <p class="text-sm mt-2">请点击上方的活动卡片，开启你的智慧之旅吧！</p>
            </div>
        </div>

    </div>

    <script>
        // 🛠️ 0. 请把你在主页使用的 Supabase URL 和 Key 复制填入这里！
        const SUPABASE_URL = "https://exbgasbhiztzeixustjo.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4Ymdhc2JoaXp0emVpeHVzdGpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3Mjk4OTYsImV4cCI6MjA5NDMwNTg5Nn0.jTHl9nZqyMh59d4nDVnfqyMtsagR3SIF0YxY3NiLqbE";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 📚 1. 简易课文大本营（老师以后可以在这里扩展 1 到 20 单元的真实内容）
        const courseData = {
            1: {
                title: "第一课：《智慧的种子》",
                text: "在成长的道路上，每一段跌倒的经历都是一颗智慧的种子。只有经过风雨的洗礼，这些种子才能在我们的心田里生根发芽，开出坚强的话...",
                words: [
                    { name: "睿智", pinyin: "ruì zhì", mean: "见识卓越，富有远见与智慧。" },
                    { name: "蜕变", pinyin: "tuì biàn", mean: "比喻事物发生质的改变，通常指变得更好。" }
                ]
            },
            2: {
                title: "第二课：《温暖的心灯》",
                text: "那一盏在黑夜中摇曳的心灯，虽然微弱，却照亮了迷茫者前行的道路。人与人之间的关怀，往往能在最寒冷的季节里，传递最炙热的温度...",
                words: [
                    { name: "摇曳", pinyin: "yáo yè", mean: "轻轻地摆动。" },
                    { name: "炙热", pinyin: "zhì rè", mean: "极热，通常形容感情或温度极高。" }
                ]
            },
            3: {
                title: "第三课：《迈向新旅程》",
                text: "课文正在筹备中，敬请期待...",
                words: [{ name: "旅程", pinyin: "lǚ chéng", mean: "旅行的路途。" }]
            }
            // 💡 4 至 20 单元可以按照这个格式继续往下写
        };

    // 存储当前选中的单元，默认是第一单元
        let currentUnit = 1;        
        
        // 🛡️ 2. 安全检查与名字读取初始化
        window.onload = async function() {
            try {
                // A. 检查当前是否有登录 Session
                const { data: { session }, error: authError } = await supabaseClient.auth.getSession();
                
                if (authError || !session) {
                    console.log("🔒 未检测到登录状态，正重定向至登录页面...");
                    // ⚠️ 如果没登录，直接跳转到登录页面（请根据你的登录页文件名修改，比如 login.html 或 index.html）
                    window.location.href = 'index.html'; 
                    return;
                }

                // B. 拿到登录用户的 ID 
                const userId = session.user.id;

                // C. 从数据库 student_profiles 表中读取学生的真实名字 real_name
                const { data: profile, error: dbError } = await supabaseClient
                    .from('student_profiles')
                    .select('real_name')
                    .eq('id', userId)
                    .single();

                const nameDisplay = document.getElementById('student-name-display');
                if (!dbError && profile && profile.real_name) {
                    nameDisplay.innerText = profile.real_name; // 显示真实姓名
                } else {
                    // 如果个人资料没填，默认显示其邮箱的前缀
                    nameDisplay.innerText = session.user.email.split('@')[0];
                }

                // D. 验证通过且数据加载完毕，让页面可见
                document.getElementById('page-body').classList.remove('invisible');

            } catch (err) {
                console.error("安全检查发生未知错误:", err);
                window.location.href = 'index.html';
            }
        };

        // 🚶 退出登录函数
        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

// 🚀 【新增】生成 20 个单元列表
function initUnitSelector() {
    const selector = document.getElementById('unit-selector');
    if (!selector) {
        console.error("❌ 错误：在页面上找不到 id 为 'unit-selector' 的下拉菜单标签！");
        return;
    }
    
    selector.innerHTML = ''; // 先清空旧内容
    
    // 强制循环生成 1 至 20 单元
    for (let i = 1; i <= 20; i++) {
        const option = document.createElement('option');
        option.value = i;
        
        // 检查 courseData 里有没有定义这个单元的标题
        if (courseData[i] && courseData[i].title) {
            // 如果有定义，提取出漂亮的课文名字
            const cleanTitle = courseData[i].title.includes('：《') 
                ? courseData[i].title.split('：《')[1].replace('》', '') 
                : courseData[i].title;
            option.innerText = `单元 ${i}：${cleanTitle}`;
        } else {
            // 💡 如果 4-20 单元还没写内容，保底显示这个，确保菜单不是空的
            option.innerText = `单元 ${i}：华文核心课程`;
        }
        
        selector.appendChild(option);
    }
    console.log("✅ 1至20单元下拉菜单已成功初始化渲染！");
}
        // 🚀 【新增】学生切换单元时的触发函数
        function handleUnitChange() {
            const selector = document.getElementById('unit-selector');
            currentUnit = parseInt(selector.value);
            console.log(`📂 已成功切换到单元: ${currentUnit}`);
            
            // 切换单元后，清空下方活动展示区，让学生重新选择点击
            const contentArea = document.getElementById('activity-content-container');
            contentArea.innerHTML = `
                <div class="text-center text-slate-400 pt-20">
                    <p class="text-lg font-bold">🎉 已进入单元 ${currentUnit}！</p>
                    <p class="text-sm mt-2">请点击上方的活动卡片，开启本单元的学习吧！</p>
                </div>
            `;
            // 取消所有卡片的高亮状态
            document.querySelectorAll('.activity-card').forEach(card => card.classList.remove('scale-105', 'bg-orange-50/50'));
        }

        
        // ==========================================
        // 📢 四大活动动态切换路由 (阅读、学习、练习、测验)
        // ==========================================
       function switchActivity(type) {
            const contentArea = document.getElementById('activity-content-container');
            
            document.querySelectorAll('.activity-card').forEach(card => card.classList.remove('scale-105', 'bg-orange-50/50'));
            document.getElementById(`btn-${type}`).classList.add('scale-105', 'bg-orange-50/50');

            // 💡 动态获取当前单元的数据，如果数据不存在，就提供一个保底文字
            const currentData = courseData[currentUnit] || { 
                title: `第 ${currentUnit} 课：新课筹备中`, 
                text: "本单元课文还在加紧制作中，请同学们先复习前边的单元哦！💪",
                words: [] 
            };

            switch(type) {
                case 'reading':
                    contentArea.innerHTML = `
                        <h2 class="text-2xl font-black text-blue-600 mb-4 flex items-center">📖 阅读天地 (单元 ${currentUnit})</h2>
                        <div class="bg-blue-50/60 p-6 rounded-2xl leading-relaxed text-lg text-slate-700 shadow-sm border border-blue-100">
                            <p class="mb-4 font-black text-center text-xl text-blue-800">${currentData.title}</p>
                            <p class="indent-8 mb-4">${currentData.text}</p>
                            <div class="mt-6 flex justify-center">
                                <button onclick="alert('🔊 正在播放【单元 ${currentUnit}】课文标准音频...')" class="bg-blue-500 hover:bg-blue-600 text-white font-bold px-6 py-3 rounded-xl shadow-md transition flex items-center">
                                    🎵 听标准课文朗读
                                </button>
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'learning':
                    let wordsHtml = '';
                    if (currentData.words.length === 0) {
                        wordsHtml = `<p class="text-slate-400">暂无核心词汇数据...</p>`;
                    } else {
                        currentData.words.forEach(w => {
                            wordsHtml += `
                                <div class="p-5 bg-white border-2 border-green-100 rounded-2xl shadow-sm hover:border-green-300 transition">
                                    <div class="text-2xl font-black text-slate-800 mb-1">${w.name}</div>
                                    <div class="text-sm text-slate-400 font-semibold mb-2">拼音：${w.pinyin}</div>
                                    <div class="text-base text-green-700 font-bold bg-green-50 p-2 rounded-lg">意思：${w.mean}</div>
                                </div>
                            `;
                        });
                    }

                    contentArea.innerHTML = `
                        <h2 class="text-2xl font-black text-green-600 mb-4">💡 核心词语学习 (单元 ${currentUnit})</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            ${wordsHtml}
                        </div>
                    `;
                    break;

                case 'practice':
                    // 练习部分的逻辑可以保持不变，或者以后也按照同样的方法做成动态的
                    contentArea.innerHTML = `
                        <h2 class="text-2xl font-black text-yellow-600 mb-4">✍️ 课文巩固练习 (单元 ${currentUnit})</h2>
                        <div class="p-5 bg-slate-50 rounded-2xl border border-slate-200">
                            <span class="font-bold text-lg text-slate-700">【单元 ${currentUnit}】练习题正在载入...</span>
                        </div>
                    `;
                    break;

                case 'quiz':
                    contentArea.innerHTML = `
                        <div class="text-center py-8">
                            <div class="text-6xl mb-4 animate-pulse">🎯</div>
                            <h2 class="text-3xl font-black text-red-600 mb-2">单元 ${currentUnit} 闯关挑战</h2>
                            <p class="text-slate-500 font-medium mb-6">欢迎来到单元 ${currentUnit} 测验，通过可赢取积分！</p>
                            <button onclick="alert('🚀 开始单元 ${currentUnit} 挑战！')" class="bg-gradient-to-r from-red-500 to-orange-500 text-white px-10 py-4 rounded-2xl text-xl font-black shadow-lg">
                                开始挑战 🏁
                            </button>
                        </div>
                    `;
                    break;
            }
        }

        function checkAnswer(btn, isCorrect) {
            const parent = btn.parentElement;
            parent.querySelectorAll('button').forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.className = "px-6 py-2 bg-green-500 text-white font-bold rounded-xl transition shadow-md";
                btn.innerHTML = "正确 🎉";
            } else {
                btn.className = "px-6 py-2 bg-red-500 text-white font-bold rounded-xl transition shadow-md";
                btn.innerHTML = "写错啦 ❌";
            }
        }
    </script>
</body>
</html>
