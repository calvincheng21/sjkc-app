<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六年级华文 - 智慧之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="bg-orange-50 min-h-screen pb-20">

    <div class="bg-orange-500 p-4 text-white flex items-center shadow-lg sticky top-0 z-50">
        <button onclick="window.location.href='index.html'" class="mr-4 text-2xl hover:scale-110 transition shrink-0">⬅️</button>
        <h1 class="text-xl font-bold">六年级华文：智慧之旅</h1>
    </div>

    <div class="max-w-5xl mx-auto px-4 mt-6">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex items-center justify-between border-2 border-orange-200">
            <span class="font-extrabold text-orange-800">当前进度：单元一《成长的蜕变》</span>
            <button class="bg-orange-100 text-orange-700 px-4 py-1 rounded-full text-sm font-bold hover:bg-orange-200 transition">切换单元</button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            
            <div onclick="switchActivity('reading')" id="btn-reading" class="activity-card cursor-pointer bg-white p-6 rounded-3xl shadow-md border-b-8 border-blue-400 hover:-translate-y-1 transition-all text-center">
                <div class="text-4xl mb-3">📖</div>
                <h3 class="font-extrabold text-slate-700">阅读天地</h3>
                <p class="text-xs text-slate-400 mt-1">课文朗读与赏析</p>
            </div>

            <div onclick="switchActivity('learning')" id="btn-learning" class="activity-card cursor-pointer bg-white p-6 rounded-3xl shadow-md border-b-8 border-green-400 hover:-translate-y-1 transition-all text-center">
                <div class="text-4xl mb-3">💡</div>
                <h3 class="font-extrabold text-slate-700">学习中心</h3>
                <p class="text-xs text-slate-400 mt-1">生字、部首与词语</p>
            </div>

            <div onclick="switchActivity('practice')" id="btn-practice" class="activity-card cursor-pointer bg-white p-6 rounded-3xl shadow-md border-b-8 border-yellow-400 hover:-translate-y-1 transition-all text-center">
                <div class="text-4xl mb-3">✍️</div>
                <h3 class="font-extrabold text-slate-700">巩固练习</h3>
                <p class="text-xs text-slate-400 mt-1">形近字与填充题</p>
            </div>

            <div onclick="switchActivity('quiz')" id="btn-quiz" class="activity-card cursor-pointer bg-white p-6 rounded-3xl shadow-md border-b-8 border-red-400 hover:-translate-y-1 transition-all text-center">
                <div class="text-4xl mb-3">🔥</div>
                <h3 class="font-extrabold text-slate-700">闯关挑战</h3>
                <p class="text-xs text-slate-400 mt-1">限时测验赢积分</p>
            </div>

        </div>

        <div id="activity-content-container" class="mt-8 bg-white rounded-3xl p-6 md:p-8 shadow-inner min-h-[400px] border-2 border-slate-100 transition-all duration-300">
            <div class="text-center text-slate-400 pt-20">
                <p class="text-lg font-bold">🎉 欢迎来到华文学习基地！</p>
                <p class="text-sm mt-2">请点击上方的活动卡片，开启你的智慧之旅吧！</p>
            </div>
        </div>

    </div>

    <script>
        // 动态内容路由
        function switchActivity(type) {
            const contentArea = document.getElementById('activity-content-container');
            
            // 重置所有卡片的缩放效果以突出当前选中的
            document.querySelectorAll('.activity-card').forEach(card => card.classList.remove('scale-105', 'bg-orange-50/50'));
            document.getElementById(`btn-${type}`).classList.add('scale-105', 'bg-orange-50/50');

            switch(type) {
                case 'reading':
                    contentArea.innerHTML = `
                        <h2 class="text-2xl font-black text-blue-600 mb-4 flex items-center">📖 阅读天地</h2>
                        <div class="bg-blue-50/60 p-6 rounded-2xl leading-relaxed text-lg text-slate-700 shadow-sm border border-blue-100">
                            <p class="mb-4 font-black text-center text-xl text-blue-800">第一课：《智慧的种子》</p>
                            <p class="indent-8 mb-4">在成长的道路上，每一段跌倒的经历都是一颗智慧的种子。只有经过风雨的洗礼，这些种子才能在我们的心田里生根发芽，开出坚强的话...</p>
                            <p class="indent-8">华小六年级的同学们，面对即将到来的毕业之旅，你们准备好接受蜕变的挑战了吗？</p>
                            <div class="mt-6 flex justify-center">
                                <button onclick="alert('🔊 正在播放课文标准音频...')" class="bg-blue-500 hover:bg-blue-600 text-white font-bold px-6 py-3 rounded-xl shadow-md transition flex items-center">
                                    🎵 听标准课文朗读
                                </button>
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'learning':
                    contentArea.innerHTML = `
                        <h2 class="text-2xl font-black text-green-600 mb-4">💡 核心词语学习</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="p-5 bg-white border-2 border-green-100 rounded-2xl shadow-sm hover:border-green-300 transition">
                                <div class="text-2xl font-black text-slate-800 mb-1">睿智</div>
                                <div class="text-sm text-slate-400 font-semibold mb-2">拼音：ruì zhì</div>
                                <div class="text-base text-green-700 font-bold bg-green-50 p-2 rounded-lg">意思：见识卓越，富有远见与智慧。</div>
                            </div>
                            <div class="p-5 bg-white border-2 border-green-100 rounded-2xl shadow-sm hover:border-green-300 transition">
                                <div class="text-2xl font-black text-slate-800 mb-1">蜕变</div>
                                <div class="text-sm text-slate-400 font-semibold mb-2">拼音：tuì biàn</div>
                                <div class="text-base text-green-700 font-bold bg-green-50 p-2 rounded-lg">意思：比喻事物发生质的改变，通常指变得更好。</div>
                            </div>
                        </div>
                    `;
                    break;

                case 'practice':
                    contentArea.innerHTML = `
                        <h2 class="text-2xl font-black text-yellow-600 mb-4">✍️ 课文巩固练习</h2>
                        <div class="p-4 bg-amber-50/50 border border-amber-200 rounded-2xl mb-6">
                            <p class="text-slate-700 font-bold">✨ 请找出最适合填入括号中的【形近字】：</p>
                        </div>
                        <div class="space-y-4">
                            <div class="p-5 bg-slate-50 rounded-2xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 border border-slate-200">
                                <span class="font-bold text-lg text-slate-700">1. 只要我们（ ）奋学习，就一定能取得好成绩。</span>
                                <div class="flex gap-2 shrink-0">
                                    <button onclick="checkAnswer(this, true)" class="px-6 py-2 bg-white border-2 border-yellow-400 font-bold text-slate-700 rounded-xl hover:bg-yellow-50 transition">勤</button>
                                    <button onclick="checkAnswer(this, false)" class="px-6 py-2 bg-white border-2 border-yellow-400 font-bold text-slate-700 rounded-xl hover:bg-yellow-50 transition">勒</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'quiz':
                    contentArea.innerHTML = `
                        <div class="text-center py-8">
                            <div class="text-6xl mb-4 animate-pulse">🎯</div>
                            <h2 class="text-3xl font-black text-red-600 mb-2">单元一 闯关挑战</h2>
                            <p class="text-slate-500 font-medium mb-6">本次挑战包含 10 题选择题，限时 5 分钟。通过可赢取 50 积分！</p>
                            <button onclick="alert('🚀 正在初始化大题库，准备进入限时游戏模式！')" class="bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 text-white px-10 py-4 rounded-2xl text-xl font-black shadow-lg hover:scale-105 transition duration-200">
                                开始挑战 🏁
                            </button>
                        </div>
                    `;
                    break;
            }
        }

        // 练习答案检查器
        function checkAnswer(btn, isCorrect) {
            // 禁用同组按钮防止重复点击
            const parent = btn.parentElement;
            parent.querySelectorAll('button').forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.className = "px-6 py-2 bg-green-500 text-white font-bold rounded-xl transition shadow-md";
                btn.innerHTML = "正确 🎉";
            } else {
                btn.className = "px-6 py-2 bg-red-500 text-white font-bold rounded-xl transition shadow-md";
                btn.innerHTML = "写错啦 ❌";
            }
        }
    </script>
</body>
</html>
